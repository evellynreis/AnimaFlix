<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body{
            background-image: url("img/GAMER-WALLPAPER-HD.png");
            color: rgba(255, 0, 234, 0.822);
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            align-items: center;
            justify-content: center;
            font-size: 16pt;
            font-family: Papyrus;
            width: 100%;
            height: 100vh;
        }
        
        .login{
            position: relative;
            display: flex;
            flex-direction: column;
            width: 30%;
            background-color: #000;
            border-radius: 10px;
            padding: 10px;

        }

        .login > h1{
            justify-content: center;
            align-items: center;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
        }

        label{
            display: flex;
            flex-direction: column;
        }

        input{
            margin: 0;
            padding: 0;
            width: 100%;
            color: rgba(139, 131, 131, 0.938);
            background-color: black;
            border: 2px solid rgba(255, 0, 234, 0.822);
            border-radius: 10px;
            height: 3vh;
        }
       
        button{
            color: white;
            background-color: rgba(255, 0, 234, 0.822);
            width: 100%;
            height: 5vh;
            border-radius: 10px;
        }

        button:hover{
            background-color: blueviolet;
        }
    </style>
</head>

<body>
    
    <div class="login">
        <h1>LOGIN</h1>
        <br>

        <form>
            <label>USUÁRIO:</label>
            <input placeholder="Email" type="email">
            <label>SENHA:</label>
            <input placeholder="Senha" type="password">
        </form>

        <button>LOGIN</button>

    </div>
 
    
</body>
</html>
